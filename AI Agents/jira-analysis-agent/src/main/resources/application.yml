spring:
  application:
    name: jira-analysis-agent
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        model: llama3.1:8b
        options:
          temperature: 0.2
          num-ctx: 32768
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=600s

server:
  port: 8080

jira:
  base-url: ${JIRA_BASE_URL:}
  username: ${JIRA_USERNAME:}
  api-token: ${JIRA_API_TOKEN:}

agent:
  output-directory: ${AGENT_OUTPUT_DIR:./analysis-output}
  plugins:
    external-config-path: ${AGENT_EXTERNAL_CONFIG:./external-config}
    strategy: EXTERNAL_FIRST
    hot-reload:
      enabled: ${AGENT_HOT_RELOAD:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  tracing:
    sampling:
      probability: 1.0

logging:
  level:
    com.javamsdt.agent: DEBUG
